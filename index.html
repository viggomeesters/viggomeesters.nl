<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viggo Meesters</title>
  <meta name="description" content="Data Management Consultant. Building tools, shipping code.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #090909;
      color: #a0a0a0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 80px 24px;
    }

    .page { max-width: 480px; width: 100%; }

    .name {
      font-size: 1.1em;
      font-weight: 600;
      color: #f0f0f0;
      letter-spacing: -0.01em;
    }

    .tagline {
      font-size: 0.82em;
      margin-top: 6px;
      line-height: 1.5;
    }

    .divider {
      height: 1px;
      background: #1a1a1a;
      margin: 32px 0;
    }

    .section-title {
      font-size: 0.65em;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #444;
      margin-bottom: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    a.card {
      display: block;
      padding: 14px 16px;
      background: #111;
      border: 1px solid #1a1a1a;
      border-radius: 10px;
      text-decoration: none;
      color: #c8c8c8;
      font-size: 0.8em;
      transition: border-color 0.2s, transform 0.2s;
    }

    a.card:hover {
      border-color: #333;
      transform: translateY(-1px);
    }

    a.card .card-name {
      font-weight: 500;
      color: #e8e8e8;
      margin-bottom: 3px;
    }

    a.card .card-desc {
      font-size: 0.88em;
      color: #555;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    a.link-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #111;
      border: 1px solid #1a1a1a;
      border-radius: 10px;
      text-decoration: none;
      color: #c8c8c8;
      font-size: 0.8em;
      transition: border-color 0.2s;
    }

    a.link-row:hover { border-color: #333; }
    a.link-row .arrow { color: #333; transition: color 0.2s; }
    a.link-row:hover .arrow { color: #666; }

    .footer {
      margin-top: 48px;
      font-size: 0.7em;
      color: #2a2a2a;
    }

    @media (max-width: 480px) {
      body { padding: 48px 16px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="name">Viggo Meesters</div>
    <div class="tagline">Data management consultant at McCoy.<br>Building tools, shipping code.</div>

    <div class="divider"></div>

    <div class="section-title">Projects</div>
    <div class="grid">
      <a href="https://minimal-etl-modeler.vercel.app" class="card" target="_blank">
        <div class="card-name">Minimal ETL Modeler</div>
        <div class="card-desc">Visual data flow editor</div>
      </a>
      <a href="https://money-shower.vercel.app" class="card" target="_blank">
        <div class="card-name">Money Shower</div>
        <div class="card-desc">Salary visualizer</div>
      </a>
      <a href="https://visual-pm-app.vercel.app" class="card" target="_blank">
        <div class="card-name">Visual PM</div>
        <div class="card-desc">Project management</div>
      </a>
      <a href="https://kraamweek.vercel.app" class="card" target="_blank">
        <div class="card-name">Kraamweek</div>
        <div class="card-desc">Newborn planning</div>
      </a>
    </div>

    <div class="divider"></div>

    <div class="section-title">Links</div>
    <div class="links">
      <a href="https://github.com/viggomeesters" class="link-row" target="_blank">
        <span>GitHub</span>
        <span class="arrow">&rarr;</span>
      </a>
      <a href="https://linkedin.com/in/viggomeesters" class="link-row" target="_blank">
        <span>LinkedIn</span>
        <span class="arrow">&rarr;</span>
      </a>
      <a href="mailto:viggomeesters@icloud.com" class="link-row">
        <span>viggomeesters@icloud.com</span>
        <span class="arrow">&rarr;</span>
      </a>
    </div>

    <div class="footer">&copy; 2026</div>

  </div>
</body>
</html>
