<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">FOCI: Fear of Choosing Incorrectly</title>
  <desc id="desc">A dark editorial decision-making hero with option cards, a highlighted choice, a compass, and a good-enough checkmark.</desc>
  <defs>
    <radialGradient id="g1" cx="18%" cy="12%" r="70%"><stop offset="0" stop-color="#f97316" stop-opacity=".28"/><stop offset="1" stop-color="#0c0c0f" stop-opacity="0"/></radialGradient>
    <radialGradient id="g2" cx="76%" cy="24%" r="62%"><stop offset="0" stop-color="#a855f7" stop-opacity=".24"/><stop offset="1" stop-color="#0c0c0f" stop-opacity="0"/></radialGradient>
    <radialGradient id="g3" cx="55%" cy="80%" r="70%"><stop offset="0" stop-color="#3b82f6" stop-opacity=".18"/><stop offset="1" stop-color="#0c0c0f" stop-opacity="0"/></radialGradient>
