<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="robots" content="noindex, nofollow"><meta name="referrer" content="no-referrer"><link rel="canonical" href="https://viggomeesters.com/chat-reply/"><link rel="icon" href="/favicon.ico" sizes="any"><link rel="icon" href="/favicon.svg" type="image/svg+xml"><link rel="apple-touch-icon" href="/apple-touch-icon.png"><link rel="manifest" href="/site.webmanifest"><title>Reply to website chat</title><script defer src="/_vercel/insights/script.js"></script><style>*{box-sizing:border-box}body{min-height:100dvh;margin:0;display:grid;place-items:center;padding:20px;background:#090b10;color:#eef2f7;font:16px/1.55 system-ui,-apple-system,'Segoe UI',sans-serif}.card{width:min(620px,100%);padding:26px;border:1px solid #2a3340;border-radius:20px;background:#10151d;box-shadow:0 24px 70px #0008}h1{margin:0 0 8px;font-size:1.45rem}p{margin:0 0 18px;color:#99a5b5}textarea{width:100%;min-height:170px;padding:15px;border:1px solid #344052;border-radius:14px;background:#080b10;color:#fff;font:inherit;resize:vertical}textarea:focus{outline:2px solid #63dcff;outline-offset:2px}button{margin-top:12px;padding:12px 18px;border:0;border-radius:999px;background:#fff;color:#090b10;font-weight:750;cursor:pointer}button:disabled{opacity:.5}#status{min-height:24px;margin-top:12px;color:#8ddfff}</style></head><body><main class="card"><h1>Reply as Viggo</h1><p>This reply appears directly inside the visitor's chat window.</p><label for="reply">Message</label><textarea id="reply" maxlength="1000" autofocus></textarea><button id="send" type="button">Send reply</button><div id="status" role="status"></div></main><script>const params=new URLSearchParams(location.search),button=document.getElementById('send'),reply=document.getElementById('reply'),status=document.getElementById('status');button.addEventListener('click',async()=>{const body=reply.value.trim();if(!body)return;button.disabled=true;status.textContent='Sending…';try{const response=await fetch('/api/chat/reply/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:params.get('token'),expires:params.get('expires'),signature:params.get('signature'),body})}),data=await response.json();if(!response.ok)throw new Error();reply.value='';status.textContent='Reply sent. You can close this page.'}catch{status.textContent='Reply failed or the link expired.'}finally{button.disabled=false}})</script></body></html>
